<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>CIAO</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      height: 100vh;
    }

    .item {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2vw;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="container" id="container"></div>

<script>
  const text = "UCCIDITI";
  const container = document.getElementById("container");

  for (let i = 0; i < 500; i++) {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = text;
    container.appendChild(div);
  }
</script>

</body>
</html>
